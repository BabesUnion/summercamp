  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  text-align: center;
}

.camp-title {
  font-size: 24px;
  font-weight: 400;
  color: #000;
  line-height: 1.35;
  margin-bottom: 16px;
}

.camp-title .en {
  font-family: 'Tan Meringue', serif;
  font-size: 30px;
  letter-spacing: 0.02em;
}

.q-label {
  font-size: 12px;
  font-weight: 400;
  color: #000;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
  opacity: 0.55;
}

.q-text {
  font-size: 24px;
  font-weight: 400;
  color: #000;
  line-height: 1.35;
  margin-bottom: 24px;
  height: 96px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;

}

.opt-btn {
  background: #fff;

  border-radius: 10px;
  padding: 14px 18px;
  font-size: 15px;

.start-sub {
  font-size: 16px;
  color: #000;

}

.start-btn {
  background: #fff;
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 18px 52px;
  font-size: 20px;
  font-weight: 400;
  font-family: 'Lexend Deca', sans-serif;

.progress-bar-wrap {
  width: 100%;

}

  font-family: 'Tan Meringue', serif;
  font-size: 30px;

  line-height: 1.25;

  letter-spacing: 0.02em;

  font-style: italic;

  background: #fff;
  color: #000;
  border: none;
  border-radius: 10px;

  font-size: 15px;

</style>

<div id="quiz-root">

<div class="screen" id="screen-start">
  <div class="camp-title">Тест на нашу совместимость<br>в <span class="en">SUMMER CAMP</span></div>
  <div class="start-sub">Пройди его, чтобы понять,<br>какая роль будет отведена тебе в команде!</div>
  <button class="start-btn" onclick="startQuiz()">Начать тест</button>
</div>

<div class="screen hidden" id="screen-question">
  <div class="q-label" id="q-label">Вопрос 1 из 7</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="q-progress" style="width:0%"></div>
  </div>
  <div class="q-text" id="q-text"></div>
  <div class="options" id="q-options"></div>
</div>

<div class="screen hidden" id="screen-result">
  <div class="result-label">Твой результат</div>
  <div class="result-title" id="res-title"></div>
  <div class="result-text" id="res-text"></div>
  <button class="retry-btn" onclick="restartQuiz()">Пройти ещё раз</button>
</div>

</div>

<script>
const questions = [
  {
    text: "Как часто ты планируешь стримить в июле?",
    options: [
      { text: "1–2 раза в неделю",   scores: { lost:1, indoor:2, fire:0, soft:1, gold:0 } },
      { text: "3–4 раза в неделю",   scores: { lost:1, indoor:1, fire:1, soft:2, gold:1 } },
      { text: "5–7 раз в неделю",    scores: { lost:0, indoor:0, fire:2, soft:1, gold:3 } }
    ]
  },
  {
    text: "Какая у тебя ниша по вайбу?",
    options: [
      { text: "У меня нет ниши / не знаю", scores: { lost:3, indoor:2, fire:0, soft:0, gold:0 } },
      { text: "Gamer girl",                 scores: { lost:1, indoor:0, fire:2, soft:0, gold:1 } },
      { text: "Shy girl",                   scores: { lost:1, indoor:1, fire:0, soft:3, gold:1 } },
      { text: "Erotic goddess",             scores: { lost:0, indoor:0, fire:1, soft:3, gold:2 } },
      { text: "Girl-next-door",             scores: { lost:1, indoor:0, fire:2, soft:1, gold:1 } }
    ]
  },
  {
    text: "Тебе нравится работать в команде?",
    options: [
      { text: "Обычно со всем справляюсь сама, не ищу поддержки", scores: { lost:0, indoor:0, fire:1, soft:1, gold:3 } },
      { text: "Я стесняюсь работы в команде, но хочу попробовать", scores: { lost:2, indoor:2, fire:0, soft:1, gold:0 } },
      { text: "Я обожаю командную работу!",                         scores: { lost:1, indoor:0, fire:3, soft:1, gold:1 } },
      { text: "Люди? Много?? Разговаривают со мной?????",           scores: { lost:3, indoor:3, fire:0, soft:1, gold:0 } }
    ]
  },
  {
    text: "Как бы ты описала себя на стримах?",
    options: [
      { text: "Я очень нежная и чувственная",                                                 scores: { lost:0, indoor:2, fire:0, soft:3, gold:0 } },
      { text: "Я не знаю хто я",                                                              scores: { lost:4, indoor:1, fire:0, soft:0, gold:0 } },
      { text: "Я властная, сильная и независимая!",                                           scores: { lost:0, indoor:0, fire:3, soft:2, gold:2 } },
      { text: "Я чаще шучу, чем дрочу",                                                      scores: { lost:1, indoor:0, fire:4, soft:0, gold:0 } },
      { text: "Я стараюсь быть нормальной, но мемберы начинают о чём-то догадываться…", scores: { lost:2, indoor:2, fire:3, soft:1, gold:0 } }
    ]
  },
  {
    text: "Тебе нравится учиться новому и экспериментировать?",
    options: [
      { text: "Я считаю, что никакие эксперименты не помогут мне в работе", scores: { lost:2, indoor:3, fire:0, soft:0, gold:0 } },
      { text: "Я редко что-то меняю на своих стримах",                       scores: { lost:2, indoor:2, fire:1, soft:2, gold:0 } },
      { text: "Я часто пробую новое и мне нравится совершенствоваться",      scores: { lost:0, indoor:0, fire:2, soft:1, gold:4 } }
    ]
  },
  {
    text: "Как ты обычно решаешь трудности, возникающие на стриме?",
    options: [
      { text: "Я паникую, но потом берусь за дело",               scores: { lost:3, indoor:1, fire:2, soft:0, gold:0 } },
      { text: "Я спокойна и сосредоточена, ничто меня не сломает", scores: { lost:0, indoor:0, fire:0, soft:4, gold:3 } },
      { text: "Всё уже горит, я сваливаю!",                       scores: { lost:2, indoor:4, fire:4, soft:0, gold:0 } }
    ]
  },
  {
    text: "Ты готова к большим изменениям в работе ради результата?",
    options: [
      { text: "Я сомневаюсь, что смогу всё поменять",   scores: { lost:2, indoor:3, fire:0, soft:1, gold:0 } },
      { text: "Я открыта к изменениям, но мне страшно", scores: { lost:3, indoor:1, fire:1, soft:1, gold:0 } },
      { text: "Меняйте всё и можно без хлеба!",         scores: { lost:0, indoor:0, fire:3, soft:1, gold:4 } }
    ]
  }
];

const results = {
  lost: {
    title: "Lost-but-Cute Camper",
    html: "Ты понятия не имеешь, куда ведёт тропа, забыла карту, перепутала маршрут и, возможно, уже третий раз спрашиваешь: «А мы точно туда идём?» Но в этом и есть твоя главная супер-сила. Ты не всегда знаешь план, зато умеешь делать любое приключение лучше. С тобой можно случайно свернуть не туда, но почему-то именно там начинается самая интересная часть похода."
  },
  indoor: {
    title: "The Indoor Camper",
    html: "Ты может и любишь эстетику кэмпа и саму идею выживать в дикой природе, но настоящий поход на вершину топа? Точно нет. Лучше остаться в стороне, наблюдая за страданиями других кэмперов в чате. Не осуждаю, потому что кэмперы всё равно планируют украсть тебя, пока ты спишь и привезти в CAMP на заднем сиденье машины, если понадобится <em>(это почти не похищение!)</em>"
  },
  fire: {
    title: "The Firestarter",
    html: "Как только ты нажимаешь кнопку «Начать трансляцию» — температура кэмпа растёт. Ты настолько горячая штучка, что даже не страшно, если в процессе загорится и ноутбук, но главное что мемберы оценили шоу! Другие кэмперши уже спрятали лагерные спички от греха подальше — как только у тебя появляется идея, её уже не остановить. И даже если обучение, рутина и показатели — это не твоя тема, чату кэмперов ты подаришь самые лучшие истории у костра."
  },
  soft: {
    title: "The Soft Survivalist",
    html: "Ты может и выглядишь мягкой, но можешь пережить плохой стрим, низкий трафик и странные сообщения с профессиональным лицом. Ты — единственный островок стабильности в нашем диком хаосе, и поэтому весь лагерь неизбежно начнёт вращаться вокруг тебя. Не специально. Наверное."
  },
  gold: {
    title: "The Gold Star Camper",
    html: "Куда бы ни вели твои планы и цели — ты уже строишь маршрут в эксель-табличках. Расписание, идеи для контента, стратегия стрима: у всего есть направление и высокие ожидания. Это вообще-то страшно, ты хоть иногда импровизируешь? Главное вовремя отобрать у тебя чек-лист чистоты в палатке и предотвратить попытки выставить оценку походного супа по 10-балльной шкале — и я думаю, мы сработаемся!"
  }
};

let currentQ = 0;
let totalScores = { lost:0, indoor:0, fire:0, soft:0, gold:0 };
let locked = false;

function startQuiz() {
  document.getElementById('screen-start').classList.add('hidden');
  document.getElementById('screen-question').classList.remove('hidden');
  currentQ = 0;
  totalScores = { lost:0, indoor:0, fire:0, soft:0, gold:0 };
  renderQuestion();
}

function renderQuestion() {
  locked = false;
  const q = questions[currentQ];
  document.getElementById('q-label').textContent = 'Вопрос ' + (currentQ + 1) + ' из ' + questions.length;
  document.getElementById('q-progress').style.width = (currentQ / questions.length * 100) + '%';
  document.getElementById('q-text').textContent = q.text;
  const optContainer = document.getElementById('q-options');
  optContainer.innerHTML = '';
  q.options.forEach(function(opt, i) {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.text;
    btn.onclick = function() { selectOption(i, btn); };
    optContainer.appendChild(btn);
  });
}

function selectOption(idx, btn) {
  if (locked) return;
  locked = true;
  btn.classList.add('selected');
  const scores = questions[currentQ].options[idx].scores;
  for (const key in scores) totalScores[key] += scores[key];
  setTimeout(function() {
    currentQ++;
    if (currentQ >= questions.length) { showResult(); } else { renderQuestion(); }
  }, 280);
}

function showResult() {
  document.getElementById('screen-question').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('hidden');
  let winner = 'lost', max = -1;
  for (const key in totalScores) {
    if (totalScores[key] > max) { max = totalScores[key]; winner = key; }
  }
  const r = results[winner];
  document.getElementById('res-title').textContent = r.title;
  document.getElementById('res-text').innerHTML = r.html;
}

function restartQuiz() {
  document.getElementById('screen-result').classList.add('hidden');
  document.getElementById('screen-start').classList.remove('hidden');
}
</script>
</body>
</html>
